// Dota 2 GSI Configuration
// Place this file in: C:\Program Files (x86)\Steam\steamapps\common\dota 2 beta\game\dota\cfg\gsi.cfg

// GSI Configuration Block
"dota2_agent"
{
    "uri"             "http://localhost:1337/"
    "timeout"         "5.0"
    "buffer"          "0.001"
    "throttle"        "0.001"
    "heartbeat"       "1.0"
    "auth"            "dota2_agent"
}

// Console commands:
// hostip localhost        - connect to localhost
// dota_dev disconnect     - disconnect
// dota_dev connect localhost  - alternative command
