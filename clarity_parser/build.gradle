plugins {
    id 'application'
    id 'java'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.skadistats:clarity:2.2.1'
}

application {
    mainClass = 'DemoParser'
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

run {
    workingDir = rootProject.projectDir
}
